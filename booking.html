<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đặt tour</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>ĐẶT TOUR</header>

<form onsubmit="return datTour()">

<input type="text" id="name" placeholder="Họ tên">
<input type="text" id="phone" placeholder="SĐT">
<input type="email" id="email" placeholder="Email">

<select id="tour">
<option value="">Chọn điểm đến</option>
<option>Đà Nẵng</option>
<option>Đà Lạt</option>
<option>Phú Quốc</option>
<option>Hạ Long</option>
</select>

<input type="date" id="date">
<input type="number" id="people" placeholder="Số người">

<textarea placeholder="Ghi chú"></textarea>

<button type="submit">Đặt tour</button>

</form>

<p id="message"></p>

<script src="js/script.js"></script>

</body>
</html>
