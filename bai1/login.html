<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <style>
    *{
        box-sizing: border-box;
    }

    body{
        font-family: Arial;
        background-color: #f2f2f2;
    }

    .login-box{
        width: 350px;
        margin: 100px auto;
        padding: 20px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 10px gray;
    }

    h2{
        text-align: center;
    }

    input{
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        margin-bottom: 15px;
    }

    button{
        width: 100%;
        padding: 10px;
        background: blue;
        color: white;
        border: none;
        cursor: pointer;
    }

    button:hover{
        background: darkblue;
    }
</style>
</head>
<body>

<div class="login-box">
    <h2>Đăng nhập</h2>

    <form action="process_login.php" method="POST">

        <label>Tên đăng nhập:</label>
        <input type="text" name="username">

        <label>Mật khẩu:</label>
        <input type="password" name="password">

        <button type="submit">Đăng nhập</button>

    </form>
</div>

</body>
</html>
